<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Partner Health Summary — April 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #000050;
  --lime: #B0F467;
  --white: #FFFFFF;
  --teal: #93DFE3;
  --yellow: #FCFE67;
  --red: #EF4444;
  --green: #22C55E;
  --amber: #F59E0B;
  --page-bg: #f5f5f5;
  --card-border: #f0f0f0;
  --track-bg: #f0f0f0;
  --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
  --card-shadow-hover: 0 6px 20px rgba(0, 0, 0, 0.12);
  --gray-text: #64748B;
  --gray-light: #CBD5E1;
  --bar-green: #B0F467;
  --bar-yellow: #FCFE67;
  --bar-red: #EF4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: 'WPP', 'Inter', system-ui, sans-serif;
  background: var(--page-bg);
  color: var(--navy);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}
/* Header — unchanged navy bar */
.header { background:var(--navy); color:var(--white); padding:16px 32px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.header-left { font-size:14px; font-weight:600; letter-spacing:.2px; }
.header-right { display:flex; align-items:center; gap:16px; font-size:13px; font-weight:600; }
.header-right .divider { opacity:.45; }
.wordmark-img { height:28px; width:auto; display:block; }
.wordmark-text { font-size:13px; font-weight:700; letter-spacing:.5px; }

/* Airy main container */
.container { flex:1; width:100%; max-width:1200px; margin:0 auto; padding:48px 32px; display:flex; flex-direction:column; }
h2.section-title { font-size:24px; font-weight:700; margin:0 0 32px; color:var(--navy); letter-spacing:-0.3px; }

/* Card rows */
.card-rows { display:flex; flex-direction:column; gap:32px; }
.card-row { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; }
@media(max-width:768px) { .card-row { grid-template-columns:1fr; } }

/* Partner cards — WPP site aesthetic: sharp corners, soft shadow, clean white */
.card {
  background: var(--white);
  border: 1px solid var(--card-border);
  border-radius: 4px;
  padding: 24px;
  cursor: pointer;
  box-shadow: var(--card-shadow);
  transition: box-shadow .2s ease, transform .15s ease;
}
.card:hover { box-shadow: var(--card-shadow-hover); transform:translateY(-2px); }
.card.active { box-shadow: var(--card-shadow-hover); border-color: var(--navy); }
.card-name { font-size:18px; font-weight:700; color:var(--navy); margin-bottom:16px; letter-spacing:-0.2px; }

/* Slim, rounded-end bars */
.health-bar-track { height:8px; background:var(--track-bg); border-radius:4px; margin-bottom:12px; overflow:hidden; }
.health-bar-fill { height:100%; border-radius:4px; transition:width .4s ease; }
.card-score { font-size:32px; font-weight:700; text-align:center; margin:16px 0 12px; display:flex; justify-content:center; align-items:baseline; gap:4px; letter-spacing:-0.5px; }
.card-footer { text-align:center; margin-top:12px; }

/* Status badges */
.badge { display:inline-block; padding:5px 14px; border-radius:20px; font-size:11px; font-weight:700; color:var(--white); letter-spacing:.3px; }
.badge-healthy { background:var(--green); }
.badge-monitor { background:var(--amber); }
.badge-action { background:var(--red); }
.badge-unknown { background:var(--gray-light); color:var(--navy); }

/* Month-over-month delta */
.delta { font-size:11px; font-weight:700; align-self:flex-start; margin-top:6px; line-height:1; }
.delta.up { color:var(--green); }
.delta.down { color:var(--red); }
.delta-detail { font-size:14px; margin-left:6px; vertical-align:super; line-height:1; }

/* Row-level detail panel — airy white card */
.row-detail {
  display: none;
  background: var(--white);
  border: 1px solid var(--card-border);
  border-radius: 4px;
  padding: 40px;
  box-shadow: var(--card-shadow);
  animation: fadeIn .25s ease;
}
.row-detail.open { display:block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
.detail-grid { display:grid; grid-template-columns:1fr 1.5fr 1fr; gap:40px; }
@media(max-width:900px) { .detail-grid { grid-template-columns:1fr; } }
.detail-section h3 { font-size:11px; font-weight:700; color:var(--gray-text); margin-bottom:14px; text-transform:uppercase; letter-spacing:1.2px; }
.detail-composite { font-size:48px; font-weight:700; display:inline-block; line-height:1; letter-spacing:-1px; color:var(--navy); }

/* Dimension score bars — slim with label/score flanking */
.dim-row { margin-bottom:16px; }
.dim-label { font-size:12px; font-weight:600; color:var(--navy); margin-bottom:6px; }
.dim-bar-wrap { display:flex; align-items:center; gap:12px; }
.dim-bar-track { flex:1; height:8px; background:var(--track-bg); border-radius:4px; overflow:hidden; }
.dim-bar-fill { height:100%; border-radius:4px; }
.dim-score { font-size:13px; font-weight:700; color:var(--navy); min-width:32px; text-align:right; }

/* Region breakdown rows */
.region-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-top:1px solid var(--card-border); }
.region-row:first-of-type { border-top:none; padding-top:0; }
.region-name { font-size:12px; width:56px; font-weight:600; letter-spacing:.3px; }
.region-bar-track { flex:1; height:8px; background:var(--track-bg); border-radius:4px; overflow:hidden; }
.region-bar-fill { height:100%; border-radius:4px; }
.region-score { font-size:13px; font-weight:700; width:36px; text-align:right; color:var(--navy); }

/* Qualitative boxes — white card + accent border (no colored fills) */
.qual-box {
  margin-bottom: 20px;
  padding: 24px;
  border-radius: 4px;
  border-left: 4px solid;
  background: var(--white);
  box-shadow: var(--card-shadow);
}
.qual-box h4 { font-size:11px; font-weight:700; margin-bottom:14px; text-transform:uppercase; letter-spacing:1.2px; color:var(--gray-text); }
.qual-box ul { list-style:none; padding:0; }
.qual-box ul li { font-size:13px; color:var(--navy); padding:6px 0; line-height:1.5; }
.qual-box ul li::before { content:"\2022 "; color:var(--gray-light); margin-right:4px; }
.qual-box.working { border-left-color:var(--green); }
.qual-box.attention { border-left-color:var(--red); }
.qual-box.escalation-active { border-left-color:var(--red); }
.qual-box.escalation-none { border-left-color:var(--gray-light); }
.qual-placeholder { font-size:13px; color:var(--gray-text); font-style:italic; }
.region-tag { display:inline-block; font-size:10px; font-weight:700; color:var(--navy); background:var(--page-bg); padding:2px 8px; border-radius:3px; margin-right:8px; letter-spacing:.5px; }

/* Tabs */
.tabs { display:flex; gap:6px; margin-bottom:24px; flex-wrap:wrap; }
.tab { padding:8px 16px; border-radius:4px; font-size:12px; font-weight:600; cursor:pointer; background:var(--page-bg); color:var(--gray-text); border:none; transition:all .15s ease; letter-spacing:.3px; }
.tab:hover { background:var(--card-border); }
.tab.active { background:var(--navy); color:var(--white); }

/* Trend chart */
.trend-chart { display:flex; align-items:flex-end; gap:8px; height:140px; padding-top:24px; position:relative; }
.trend-bar-wrap { display:flex; flex-direction:column; align-items:center; flex:1; height:100%; justify-content:flex-end; }
.trend-val { font-size:11px; font-weight:700; margin-bottom:4px; color:var(--navy); }
.trend-bar { width:100%; min-width:18px; max-width:40px; border-radius:4px 4px 0 0; }
.trend-month { font-size:11px; color:var(--gray-text); margin-top:6px; font-weight:600; letter-spacing:.3px; }
.trend-note { font-size:12px; color:var(--gray-text); font-style:italic; margin-top:12px; }

/* Footer */
.footer { background:var(--navy); color:rgba(255,255,255,.7); text-align:center; padding:16px; font-size:11px; flex-shrink:0; letter-spacing:.3px; }
</style>
</head>

s": [8.0, 8.0, 7.0, 8.0, 7.0, 8.0], "working": "Cross-channel reporting excellent", "attention": "Limited LATAM support coverage", "escalation": ""}, "EMEA": {"scores": [7.0, 8.0, 7.0, 7.0, 7.0, 7.0], "working": "Solid product roadmap visibility", "attention": "Support tickets slow to resolve", "escalation": ""}, "APAC": {"scores": [7.0, 8.0, 7.0, 7.0, 7.0, 7.0], "working": "Strong bid management tools", "attention": "APAC documentation very limited", "escalation": ""}, "LATAM": {"scores": [7.0, 7.0, 6.0, 7.0, 6.0, 7.0], "working": "Good client success engagement", "attention": "No LATAM-specific reporting available", "escalation": ""}}, "byRegionHistory": {"NA": [{"month": "Apr", "score": 7.666666666666667}], "EMEA": [{"month": "Apr", "score": 7.166666666666667}], "APAC": [{"month": "Apr", "score": 7.166666666666667}], "LATAM": [{"month": "Apr", "score": 6.666666666666667}]}, "prevComposite": null}}};
const CARDS_PER_ROW = 3;

function scoreColor(s) {
  if (s == null) return 'var(--gray-light)';
  if (s >= 7) return 'var(--bar-green)';
  if (s >= 5) return 'var(--bar-yellow)';
  return 'var(--bar-red)';
}
function badgeClass(status) {
  if (!status) return 'badge-unknown';
  const s = status.toLowerCase();
  if (s.includes('healthy')) return 'badge-healthy';
  if (s.includes('monitor')) return 'badge-monitor';
  return 'badge-action';
}
function statusFromScore(s) {
  if (s == null) return null;
  if (s >= 7) return 'Healthy';
  if (s >= 5) return 'Monitor';
  return 'Action Required';
}
function fmtScore(v) { return v == null ? '\u2014' : v.toFixed(1); }

function deltaHTML(current, previous, detail) {
  if (current == null || previous == null) return '';
  const diff = current - previous;
  if (Math.abs(diff) < 0.05) return '';
  const cls = diff > 0 ? 'up' : 'down';
  const arrow = diff > 0 ? '\u25B2' : '\u25BC';
  const cls2 = detail ? 'delta delta-detail ' + cls : 'delta ' + cls;
  return `<span class="${cls2}">${arrow}${Math.abs(diff).toFixed(1)}</span>`;
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function buildCards() {
  const host = document.getElementById('cardRows');
  const partners = D.partners;
  for (let rowStart = 0; rowStart < partners.length; rowStart += CARDS_PER_ROW) {
    const rowIdx = rowStart / CARDS_PER_ROW;

    // Row of up to CARDS_PER_ROW cards
    const row = document.createElement('div');
    row.className = 'card-row';
    partners.slice(rowStart, rowStart + CARDS_PER_ROW).forEach(p => {
      const sc = D.scoring[p] || {};
      const resp = D.responses[p] || {};
      const composite = sc.composite;
      const status = sc.status || statusFromScore(composite);
      const pct = composite != null ? Math.min(composite, 10) / 10 * 100 : 0;
      const delta = deltaHTML(composite, resp.prevComposite, false);

      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.partner = p;
      card.dataset.row = String(rowIdx);
      card.innerHTML = `
        <div class="card-name">${escapeHtml(p)}</div>
        <div class="health-bar-track"><div class="health-bar-fill" style="width:${pct}%;background:${scoreColor(composite)}"></div></div>
        <div class="card-score"><span>${fmtScore(composite)}</span>${delta}</div>
        <div class="card-footer"><span class="badge ${badgeClass(status)}">${status || '\u2014'}</span></div>`;
      card.onclick = () => toggleDetail(p, rowIdx);
      row.appendChild(card);
    });
    host.appendChild(row);

    // Shared row-detail slot (one per row of cards) — pushes later rows down
    const rowDetail = document.createElement('div');
    rowDetail.className = 'row-detail';
    rowDetail.id = 'row-detail-' + rowIdx;
    host.appendChild(rowDetail);
  }
}

let openPartner = null;
function toggleDetail(p, rowIdx) {
  const wasOpen = (openPartner === p);
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.row-detail').forEach(d => { d.classList.remove('open'); d.innerHTML = ''; });
  if (wasOpen) { openPartner = null; return; }
  openPartner = p;
  document.querySelector(`.card[data-partner="${p}"]`).classList.add('active');
  const host = document.getElementById('row-detail-' + rowIdx);
  host.classList.add('open');
  renderDetail(p, host, 'rollup');
  host.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function renderDetail(p, el, view) {
  const sc = D.scoring[p] || {};
  const resp = D.responses[p] || {};
  const regional = D.regional[p] || {};
  const byRegion = resp.byRegion || {};
  const byRegionHistory = resp.byRegionHistory || {};
  const availRegions = D.regions.filter(r => byRegion[r]);

  let tabs = '<div class="tabs">';
  tabs += `<button class="tab ${view==='rollup'?'active':''}" onclick="switchTab('${p}','rollup')">Roll-Up</button>`;
  availRegions.forEach(r => {
    tabs += `<button class="tab ${view===r?'active':''}" onclick="switchTab('${p}','${r}')">${escapeHtml(r)}</button>`;
  });
  tabs += '</div>';

  let content;
  if (view === 'rollup') {
    content = renderRollup(p, sc, resp, regional);
  } else {
    content = renderRegionView(p, view, byRegion[view], byRegionHistory[view] || []);
  }
  el.innerHTML = tabs + '<div class="detail-grid">' + content + '</div>';
}

function switchTab(p, view) {
  // Find whichever row-detail currently holds this partner's detail
  const activeCard = document.querySelector(`.card[data-partner="${p}"].active`);
  if (!activeCard) return;
  const rowIdx = activeCard.dataset.row;
  const el = document.getElementById('row-detail-' + rowIdx);
  renderDetail(p, el, view);
}

function renderDimBars(dims) {
  return D.dimensions.map(d => {
    const s = dims ? dims[d.key] : null;
    const pct = s != null ? Math.min(s,10)/10*100 : 0;
    return `<div class="dim-row">
      <div class="dim-label">${escapeHtml(d.label)}</div>
      <div class="dim-bar-wrap">
        <div class="dim-bar-track"><div class="dim-bar-fill" style="width:${pct}%;background:${scoreColor(s)}"></div></div>
        <span class="dim-score">${fmtScore(s)}</span>
      </div></div>`;
  }).join('');
}

// Build per-bucket tagged lists by walking byRegion entries.
// Each entry becomes "[REGION] text" so the Roll-Up view shows provenance.
function aggregateTagged(byRegion) {
  const out = { working: [], attention: [], escalation: [] };
  D.regions.forEach(r => {
    const rd = byRegion[r];
    if (!rd) return;
    ['working', 'attention', 'escalation'].forEach(b => {
      const t = (rd[b] || '').trim();
      if (t) out[b].push({ region: r, text: t });
    });
  });
  return out;
}

function renderQualTagged(tagged) {
  const renderList = items => items.map(it =>
    `<li><span class="region-tag">${escapeHtml(it.region)}</span>${escapeHtml(it.text)}</li>`
  ).join('');
  let h = '';
  // Escalation
  if (tagged.escalation.length) {
    h += `<div class="qual-box escalation-active"><h4>Escalation Status</h4><ul>${renderList(tagged.escalation)}</ul></div>`;
  } else {
    h += `<div class="qual-box escalation-none"><h4>Escalation Status</h4><div class="qual-placeholder">No active escalations</div></div>`;
  }
  // Working
  h += `<div class="qual-box working"><h4>What's Working</h4>`;
  h += tagged.working.length ? `<ul>${renderList(tagged.working)}</ul>` : '<div class="qual-placeholder">No data</div>';
  h += '</div>';
  // Attention
  h += `<div class="qual-box attention"><h4>What Needs Attention</h4>`;
  h += tagged.attention.length ? `<ul>${renderList(tagged.attention)}</ul>` : '<div class="qual-placeholder">No data</div>';
  h += '</div>';
  return h;
}

function renderQualPlain(working, attention, escalation) {
  const renderList = items => items.map(t => `<li>${escapeHtml(t)}</li>`).join('');
  const w = (working||[]).filter(t=>t);
  const a = (attention||[]).filter(t=>t);
  const e = (escalation||[]).filter(t=>t);
  let h = '';
  if (e.length) h += `<div class="qual-box escalation-active"><h4>Escalation Status</h4><ul>${renderList(e)}</ul></div>`;
  else h += `<div class="qual-box escalation-none"><h4>Escalation Status</h4><div class="qual-placeholder">No active escalations</div></div>`;
  h += `<div class="qual-box working"><h4>What's Working</h4>`;
  h += w.length ? `<ul>${renderList(w)}</ul>` : '<div class="qual-placeholder">No data</div>';
  h += '</div>';
  h += `<div class="qual-box attention"><h4>What Needs Attention</h4>`;
  h += a.length ? `<ul>${renderList(a)}</ul>` : '<div class="qual-placeholder">No data</div>';
  h += '</div>';
  return h;
}

function renderRollup(p, sc, resp, regional) {
  const composite = sc.composite;
  const status = sc.status || statusFromScore(composite);
  const delta = deltaHTML(composite, resp.prevComposite, true);
  // Left
  let left = '<div class="detail-section">';
  left += '<h3>Composite Score</h3>';
  left += `<div><span class="detail-composite">${fmtScore(composite)}</span>${delta}</div>`;
  left += `<div style="margin:10px 0"><span class="badge ${badgeClass(status)}">${status||'\u2014'}</span></div>`;
  left += '<h3 style="margin-top:24px">Regional Breakdown</h3>';
  D.regions.forEach(r => {
    const rs = regional[r];
    const pct = rs != null ? Math.min(rs,10)/10*100 : 0;
    left += `<div class="region-row"><span class="region-name">${escapeHtml(r)}</span>
      <div class="region-bar-track"><div class="region-bar-fill" style="width:${pct}%;background:${scoreColor(rs)}"></div></div>
      <span class="region-score">${fmtScore(rs)}</span></div>`;
  });
  left += '</div>';
  // Middle
  let mid = '<div class="detail-section"><h3>Dimension Scores</h3>' + renderDimBars(sc.dimensions) + '</div>';
  // Right — tagged qualitative text from byRegion
  const tagged = aggregateTagged(resp.byRegion || {});
  let right = '<div class="detail-section">' + renderQualTagged(tagged) + '</div>';
  return left + mid + right;
}

function renderRegionView(p, region, rd, history) {
  if (!rd) return '<div class="qual-placeholder">No data for this region</div>';
  const scores = rd.scores || [];
  const valid = scores.filter(s => s != null);
  const composite = valid.length ? valid.reduce((a,b)=>a+b,0)/valid.length : null;
  const status = statusFromScore(composite);
  const dims = {};
  D.dimensions.forEach((d,i) => { dims[d.key] = i < scores.length ? scores[i] : null; });

  let left = '<div class="detail-section">';
  left += '<h3>Composite Score</h3>';
  left += `<div><span class="detail-composite">${fmtScore(composite)}</span></div>`;
  left += `<div style="margin:10px 0"><span class="badge ${badgeClass(status)}">${status||'\u2014'}</span></div>`;
  left += '<h3 style="margin-top:24px">Score Trend</h3>';
  if (history.length) {
    left += '<div class="trend-chart">';
    const maxH = 90;
    history.forEach(h => {
      const hPct = h.score != null ? Math.min(h.score,10)/10 : 0;
      const barH = Math.max(hPct * maxH, 2);
      left += `<div class="trend-bar-wrap">
        <div class="trend-val">${fmtScore(h.score)}</div>
        <div class="trend-bar" style="height:${barH}px;background:${scoreColor(h.score)}"></div>
        <div class="trend-month">${escapeHtml(h.month)}</div></div>`;
    });
    left += '</div>';
    if (history.length === 1) left += '<div class="trend-note">More data available next month</div>';
  } else {
    left += '<div class="qual-placeholder">No historical data yet</div>';
  }
  left += '</div>';

  let mid = '<div class="detail-section"><h3>Dimension Scores</h3>' + renderDimBars(dims) + '</div>';
  let right = '<div class="detail-section">' + renderQualPlain(
    rd.working ? [rd.working] : [],
    rd.attention ? [rd.attention] : [],
    rd.escalation ? [rd.escalation] : []
  ) + '</div>';
  return left + mid + right;
}

buildCards();
</script>
